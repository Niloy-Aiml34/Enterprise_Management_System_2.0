<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Student Details · SarvaDaksh</title>
  <script>(function(){var k="sarvadaksh-theme";var t=localStorage.getItem(k)||localStorage.getItem("da-theme")||"night";if(t==="dark")t="night";if(t==="light")t="day";document.documentElement.setAttribute("data-theme",t);})();</script>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <link rel="icon" type="image/png" href="{{ url_for('static', filename='images/sarvadaksh-icon.png') }}">
</head>
<body>

<div class="erp-shell">
  <nav class="erp-nav">
    <a class="erp-brand" href="/">
      <div class="erp-logo" aria-hidden="true">
        <img src="{{ url_for('static', filename='images/sarvadaksh-icon.png') }}" alt="SarvaDaksh">
      </div>
      <div>
        <span class="erp-brand-name">Sarva<b>Daksh</b></span>
        <span class="erp-brand-sub">Student Directory</span>
      </div>
    </a>
    <div class="erp-nav-actions">
      <a class="btn btn-outline-light" href="/">Home</a>
      <a class="btn btn-outline-light" href="/attendance">Dashboard</a>
      <a class="btn btn-primary" href="/add_student">＋ Add Student</a>
      <div class="erp-theme-switcher" data-erp-theme-switcher>
        <button class="erp-theme-btn" data-theme="day"      title="Day mode">☀️</button>
        <button class="erp-theme-btn" data-theme="night"    title="Night mode">🌙</button>
        <button class="erp-theme-btn" data-theme="midnight" title="Midnight mode">🌌</button>
      </div>
    </div>
  </nav>

  <div class="card p-4 reveal d1">
    <div class="d-flex flex-wrap justify-content-between align-items-center gap-3 mb-3">
      <div class="d-flex align-items-center gap-3">
        <h4 class="mb-0">Registered Students</h4>
        <span id="studentCount" class="badge">0</span>
      </div>
      <input id="searchInput" type="text" class="form-control"
        placeholder="Search by name, roll, class, section or reg no…"
        style="max-width:340px;">
    </div>

    <div class="table-responsive">
      <table class="table table-hover align-middle mb-0">
        <thead>
          <tr>
            <th>#</th>
            <th>Name</th>
            <th>Roll</th>
            <th>Class</th>
            <th>Section</th>
            <th>Reg No</th>
            <th>Added On</th>
            <th class="text-center">Action</th>
          </tr>
        </thead>
        <tbody id="studentTableBody">
          <tr><td colspan="8" class="text-center text-muted py-4">
            <span class="erp-spin"></span> Loading students…
          </td></tr>
        </tbody>
      </table>
    </div>

    <div id="noResults" class="text-center text-muted py-3 d-none">No students match your search.</div>
  </div>
</div>

<script src="{{ url_for('static', filename='js/erp-ui.js') }}"></script>
<script>
  let allStudents = [];

  async function loadStudents() {
    try {
      const res  = await fetch("/students");
      const data = await res.json();
      allStudents = data.students || [];
      render(allStudents);
    } catch {
      document.getElementById("studentTableBody").innerHTML =
        '<tr><td colspan="8" class="text-center py-4" style="color:#ffd2d2">Failed to load students.</td></tr>';
    }
  }

  function render(list) {
    const tbody = document.getElementById("studentTableBody");
    const noResults = document.getElementById("noResults");
    document.getElementById("studentCount").textContent = allStudents.length;

    if (list.length === 0) {
      tbody.innerHTML = "";
      noResults.classList.remove("d-none");
      return;
    }
    noResults.classList.add("d-none");

    tbody.innerHTML = list.map((s, i) => `
      <tr ${i < 10 ? `class="reveal d${(i % 5) + 1}"` : ''}>
        <td class="text-muted">${i + 1}</td>
        <td class="fw-semibold">${esc(s.name)}</td>
        <td>${esc(s.roll)}</td>
        <td>${esc(s.class)}</td>
        <td>${esc(s.section)}</td>
        <td><code>${esc(s.reg_no)}</code></td>
        <td class="text-muted small">${s.created_at ? s.created_at.slice(0, 10) : '—'}</td>
        <td class="text-center">
          <button class="btn btn-sm btn-outline-danger"
            onclick="deleteStudent(${s.id}, '${esc(s.name).replace(/'/g, "\\'")}')">Delete</button>
        </td>
      </tr>
    `).join("");
  }

  document.getElementById("searchInput").addEventListener("input", function () {
    const q = this.value.toLowerCase();
    render(q
      ? allStudents.filter(s =>
          [s.name, s.roll, s.class, s.section, s.reg_no]
          .some(v => (v || "").toLowerCase().includes(q)))
      : allStudents);
  });

  async function deleteStudent(id, name) {
    if (!confirm(`Delete "${name}" and all their attendance records?`)) return;
    const res = await fetch(`/students/${id}`, { method: "DELETE" });
    if (res.ok) {
      allStudents = allStudents.filter(s => s.id !== id);
      const q = document.getElementById("searchInput").value.toLowerCase();
      render(q
        ? allStudents.filter(s =>
            [s.name, s.roll, s.class, s.section, s.reg_no]
            .some(v => (v || "").toLowerCase().includes(q)))
        : allStudents);
    } else {
      alert("Failed to delete student.");
    }
  }

  function esc(str) {
    return String(str ?? "")
      .replace(/&/g, "&amp;").replace(/</g, "&lt;")
      .replace(/>/g, "&gt;").replace(/"/g, "&quot;");
  }

  loadStudents();
</script>
</body>
</html>
