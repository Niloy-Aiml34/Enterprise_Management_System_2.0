<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Add Student · SarvaDaksh</title>
  <script>(function(){var k="sarvadaksh-theme";var t=localStorage.getItem(k)||localStorage.getItem("da-theme")||"night";if(t==="dark")t="night";if(t==="light")t="day";document.documentElement.setAttribute("data-theme",t);})();</script>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <link rel="icon" type="image/png" href="{{ url_for('static', filename='images/sarvadaksh-icon.png') }}">
</head>
<body>

<div class="erp-shell">
  <nav class="erp-nav">
    <a class="erp-brand" href="/">
      <div class="erp-logo" aria-hidden="true">
        <img src="{{ url_for('static', filename='images/sarvadaksh-icon.png') }}" alt="SarvaDaksh">
      </div>
      <div>
        <span class="erp-brand-name">Sarva<b>Daksh</b></span>
        <span class="erp-brand-sub">Add Student</span>
      </div>
    </a>
    <div class="erp-nav-actions">
      <a class="btn btn-outline-light" href="/">Home</a>
      <a class="btn btn-outline-light" href="/attendance">Dashboard</a>
      <a class="btn btn-outline-warning" href="/student_details">Students</a>
      <div class="erp-theme-switcher" data-erp-theme-switcher>
        <button class="erp-theme-btn" data-theme="day"      title="Day mode">☀️</button>
        <button class="erp-theme-btn" data-theme="night"    title="Night mode">🌙</button>
        <button class="erp-theme-btn" data-theme="midnight" title="Midnight mode">🌌</button>
      </div>
    </div>
  </nav>

  <div class="row justify-content-center">
    <div class="col-lg-10">
      <div class="card p-4 reveal d1">
        <div class="d-flex justify-content-between align-items-center flex-wrap gap-2 mb-3">
          <div>
            <h4 class="mb-1">Add Student & Capture Faces</h4>
            <p class="text-muted small mb-0">Enter the student's information, then capture 50 face frames for training.</p>
          </div>
          <span id="captureStatus" class="erp-pill">Captured 0 / 50</span>
        </div>

        <form id="studentForm">
          <div class="row g-3">
            <div class="col-md-6"><input class="form-control" name="name" placeholder="Full Name *" required></div>
            <div class="col-md-3"><input class="form-control" name="roll" placeholder="Roll *" required></div>
            <div class="col-md-3"><input class="form-control" name="reg_no" placeholder="Registration No *" required></div>
            <div class="col-md-6"><input class="form-control" name="class" placeholder="Class *" required></div>
            <div class="col-md-6"><input class="form-control" name="sec" placeholder="Section *" required></div>
          </div>
          <div class="mt-3 d-flex flex-wrap gap-2">
            <button id="saveInfoBtn" type="submit" class="btn btn-primary">Save Info</button>
            <button id="startCaptureBtn" type="button" class="btn btn-warning" disabled>Start Capture (50)</button>
            <button id="addStudentBtn" type="button" class="btn btn-success" disabled>Add Student</button>
            <button type="button" class="btn btn-outline-danger ms-auto" onclick="window.location.href='/attendance'">← Back</button>
          </div>
        </form>

        <hr class="my-4">

        <div class="row g-4 align-items-start">
          <div class="col-lg-7 text-center">
            <video id="video" width="560" height="420" autoplay muted></video>
          </div>
          <div class="col-lg-5">
            <h6 class="mb-2">Capture Progress</h6>
            <div class="progress" style="height:18px;">
              <div id="progressBar" class="progress-bar" style="width:0%">0%</div>
            </div>
            <p class="text-muted small mt-3 mb-0">
              Look directly at the camera. Slowly turn left, right, up, and down so the model captures multiple angles.
            </p>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="{{ url_for('static', filename='js/erp-ui.js') }}"></script>
<script src="{{ url_for('static', filename='js/camera_add_student.js') }}"></script>
</body>
</html>
